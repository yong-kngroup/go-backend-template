version: "3.9"

services:
  postgres:
    image: postgres:18.4-alpine3.23
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: go_backend
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    restart: unless-stopped

  redis:
    image: redis:8.6.4
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  jaeger:
    image: jaegertracing/jaeger:2.19.0
    ports:
      - "16686:16686"   # UI
      - "4318:4318"     # OTLP HTTP
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
