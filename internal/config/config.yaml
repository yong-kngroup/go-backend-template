app:
  mode: "development"

server:
  ip: "0.0.0.0"
  port: 8080

database:
  dsn: "host=localhost user=postgres password=postgres dbname=go_backend port=5432 sslmode=disable TimeZone=Asia/Shanghai"

mq:
  events_name: "domain.events"
  kafka:
    brokers:
      - "localhost:9092"
    client_id: "go-backend-template"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

rate_limit:
  enabled: true
  requests: 20
  window_seconds: 60

worker:
  probe:
    ip: "0.0.0.0"
    port: 8081
  consumer_group: "user-worker"
  consumer_max_retries: 10
  consumer_processing_lock_seconds: 300
  kafka_read_min_bytes: 1024
  kafka_read_max_bytes: 10485760
  kafka_max_wait_seconds: 1
  kafka_retry_topics:
    - topic: "domain.events.retry.30s"
      delay_seconds: 30
    - topic: "domain.events.retry.5m"
      delay_seconds: 300
    - topic: "domain.events.retry.30m"
      delay_seconds: 1800
  kafka_dead_letter_topic: "domain.events.dlq"

auth:
  jwt_issuer: "go-backend-template"
  jwt_audience: "go-backend-template-client"
  jwt_secret: ""
  access_token_ttl_minutes: 15
  refresh_token_ttl_hours: 168
  login_fail_threshold: 5

mcp:
  enabled: false
  cms_base_url: ""
  service_account_name: "MCP Operator"
  service_account_email: ""
  client_id: ""
  client_secret: ""
  service_account_enabled: true
  secret_rotation_grace_minutes: 60
  token_audience: "cms-api"
  access_token_ttl_minutes: 10
  request_timeout_seconds: 10

email:
  mode: "log"
  smtp_host: "smtp.example.com"
  smtp_port: 465
  smtp_user: "developer@example.com"
  smtp_password: ""
  from_address: "developer@example.com"
  site_base_url: "http://localhost:5173"

tracing:
  endpoint: "localhost:4318"

cron:
  probe:
    ip: "0.0.0.0"
    port: 8082
  enabled: true
  outbox_publish_interval_seconds: 5
  outbox_batch_size: 100
  verification_cleanup_interval_seconds: 300
  media_upload_cleanup_interval_seconds: 300
  media_upload_cleanup_batch_size: 100
  dlq_inspection_enabled: true
  dlq_inspection_interval_seconds: 60
  dlq_inspection_batch_size: 50
  dlq_inspection_group: "user-worker-dlq-inspector"
  dlq_replay_enabled: false
  dlq_replay_interval_seconds: 300
  dlq_replay_batch_size: 20
  dlq_replay_group: "user-worker-dlq-replay"
  dlq_replay_target: "main"

bootstrap_admin:
  enabled: false
  name: "Admin"
  email: ""
  password: ""

storage:
  s3:
    endpoint: ""
    region: "auto"
    access_key_id: ""
    secret_access_key: ""
    bucket: ""
    public_base_url: ""
    prefix: "cms"
    use_path_style: true
    presign_ttl_minutes: 15
